# More option see https://github.com/DreamMaoMao/mango/wiki/

exec=wlr-randr --output DP-1 --pos 0,0 --output HDMI-A-1 --pos 1920,0
exec-once=gentoo-pipewire-launcher &

# Window effect blur=0 shadows = 0 animations=0

focused_opacity=1.0 unfocused_opacity=1.0

# Master-Stack Layout Setting new_is_master=1 default_mfact=0.55
default_nmaster=1 smartgaps=0

# Overview Setting hotarea_size=10 enable_hotarea=0 ov_tab_mode=1
ov_no_resize=1 overviewgappi=5 overviewgappo=30

# Misc no_border_when_single=1 axis_bind_apply_timeout=100
focus_on_activate=1 idleinhibit_ignore_visible=0 sloppyfocus=1
warpcursor=1 focus_cross_monitor=0 focus_cross_tag=0
enable_floating_snap=0 snap_distance=30 cursor_size=24
drag_tile_to_tile=1 drag_tile_small=1

# keyboard repeat_rate=25 repeat_delay=600 numlockon=0
xkb_rules_layout=us,ru xkb_rules_options=grp:alt_shift_toggle

disable_trackpad=1 # mouse # need relogin to make it apply
mouse_natural_scrolling=0 mouse_accel_profile=1

# Appearance gappih=2 gappiv=2 gappoh=0 gappov=0
scratchpad_width_ratio=0.8 scratchpad_height_ratio=0.9 borderpx=0
rootcolor=0x201b14ff bordercolor=0x444444ff dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
# tagrule=id:1,layout_name:tile tagrule=id:2,layout_name:tile
# tagrule=id:3,layout_name:tile tagrule=id:4,layout_name:tile
# tagrule=id:5,layout_name:tile tagrule=id:6,layout_name:tile
# tagrule=id:7,layout_name:tile tagrule=id:8,layout_name:tile
# tagrule=id:9,layout_name:tile

# Key Bindings key name refer to `xev` or `wev` command output, mod
# keys name: super,ctrl,alt,shift,none

bind=SUPER,p,spawn,librewolf bind=SUPER+SHIFT,s,spawn_shell, grim -g
"$(slurp)" - | wl-copy --type image/png

# reload config bind=SUPER,r,reload_config

# menu and terminal bind=Alt,space,spawn,rofi -show drun
bind=SUPER,Return,spawn,alacritty

# exit bind=SUPER,m,quit bind=SUPER,w,killclient,

# switch window focus bind=SUPER,Tab,focusstack,next
bind=SUPER,H,focusdir,left bind=SUPER,L,focusdir,right
bind=SUPER,K,focusdir,up bind=SUPER,J,focusdir,down

# swap window bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview, bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen, bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen, bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay, bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout bind=SUPER,n,switch_layout

bind=SUPER,1,view,1,0 bind=SUPER,2,view,2,0 bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0 bind=SUPER,5,view,5,0 bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0 bind=SUPER,8,view,8,0 bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it tagsilent: move client to
# the tag and not focus it bind=Alt,1,tagsilent,1
# bind=SUPER+SHIFT,1,tag,1,0 bind=SUPER+SHIFT,2,tag,2,0
# bind=SUPER+SHIFT,3,tag,3,0 bind=SUPER+SHIFT,4,tag,4,0
# bind=SUPER+SHIFT,5,tag,5,0 bind=SUPER+SHIFT,6,tag,6,0
# bind=SUPER+SHIFT,7,tag,7,0 bind=SUPER+SHIFT,8,tag,8,0
# bind=SUPER+SHIFT,9,tag,9,0

# monitor switch bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# Mouse Button Bindings btn_left and btn_right can't bind none mod key
# mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=SUPER,btn_right,moveresize,curresize

# layer rule layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
